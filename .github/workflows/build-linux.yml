name: Build Linux

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.14.0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install deb tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg libsecret-1-dev

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Allow required native build scripts
        run: pnpm approve-builds esbuild
        continue-on-error: true

      - name: Build Rust native module (napi)
        working-directory: rust-backend
        run: pnpm exec napi build --platform --release

      - name: Build Linux app
        run: pnpm exec electron-builder --linux deb --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: SomeApp-linux
          path: dist/*.deb
          if-no-files-found: error
